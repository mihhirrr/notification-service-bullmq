name: "Test Notification Service"

on: 
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3
        
      - uses: actions/setup-node@v3
        with:
          node-version: 20
            
      - name: Run docker compose to start the app
        run: docker compose -d up
